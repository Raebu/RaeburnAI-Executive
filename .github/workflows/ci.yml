name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python -m pip install -e apps/api[dev]
      - run: cd apps/api && ruff check .
      - run: cd apps/api && mypy raeburnai_executive
      - run: cd apps/api && pytest
      - run: cd apps/api && bandit -q -r raeburnai_executive
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - run: cd apps/web && npm install
      - run: cd apps/web && npm run typecheck
      - run: cd apps/web && npm run build
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.api -t raeburnai-executive-api .
      - run: docker build -f Dockerfile.web -t raeburnai-executive-web .
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
